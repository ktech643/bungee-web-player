<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Bungee · Web Time-Stretch Player</title>
<style>
  :root {
    --bg1: #12121f; --bg2: #1a1430; --card: rgba(255,255,255,.06);
    --pink: #ff3a8e; --text: #f4f4f8; --muted: #a0a0b4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    display: flex; justify-content: center; padding: 28px 16px;
  }
  .app { width: 100%; max-width: 440px; }
  header { text-align: center; margin-bottom: 22px; }
  header h1 { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: 5px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
  .card {
    background: var(--card); border-radius: 20px; padding: 22px;
    margin-bottom: 20px; border: 1px solid rgba(255,255,255,.06);
    transition: outline .15s; outline: 0 solid transparent;
  }
  .card.drop { outline: 2px dashed var(--pink); outline-offset: 4px; }
  .icon { font-size: 56px; text-align: center; color: var(--pink); height: 70px; line-height: 70px; }
  .icon.pulse { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
  .nowtitle { text-align: center; font-weight: 600; font-size: 17px; margin: 8px 0 16px; }
  input[type=range] { width: 100%; accent-color: var(--pink); cursor: pointer; }
  input[type=range]:disabled { opacity: .4; }
  .times { display: flex; justify-content: space-between; color: var(--muted);
           font-size: 12px; font-variant-numeric: tabular-nums; margin-top: 6px; }
  .transport { display: flex; align-items: center; justify-content: center; gap: 28px; margin: 4px 0 20px; }
  .transport button {
    background: none; border: none; color: var(--pink); cursor: pointer;
    font-size: 26px; width: 48px; height: 48px; border-radius: 50%;
  }
  .transport button:disabled { color: #555; cursor: default; }
  .transport .skip { color: #fff; display: inline-flex; align-items: center; justify-content: center; }
  .transport .skip svg { width: 34px; height: 34px; }
  #play { font-size: 30px; width: 70px; height: 70px; background: rgba(255,58,142,.15); }
  .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .row .name { font-weight: 600; }
  .row .val { color: var(--pink); font-weight: 700; font-variant-numeric: tabular-nums; }
  .hint { color: var(--muted); font-size: 12px; margin: 2px 0 14px; }
  .reset { background: none; border: none; color: var(--pink); font-weight: 600;
           cursor: pointer; display: block; margin: 4px auto 0; font-size: 13px; }
  .sources { display: grid; gap: 10px; }
  .sources button {
    padding: 13px; border-radius: 12px; border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.04); color: var(--text); font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  .sources button.primary { background: var(--pink); border-color: var(--pink); }
  .sources .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
    background: #2a2440; color: var(--text); padding: 12px 18px; border-radius: 12px;
    max-width: 90%; font-size: 13px; opacity: 0; pointer-events: none; transition: .25s;
    border: 1px solid rgba(255,255,255,.1); text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>BUNGEE</h1>
      <p>Web Time-Stretch Player</p>
    </header>

    <div class="card" id="card">
      <div class="icon" id="icon">♪</div>
      <div class="nowtitle" id="title">No track loaded</div>
      <input type="range" id="seek" min="0" max="100" step="0.1" value="0" disabled />
      <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    </div>

    <div class="transport">
      <button class="skip" id="back" disabled title="Back 10 seconds" aria-label="Back 10 seconds">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          <text x="12" y="15.5" font-size="8.5" stroke="none" fill="currentColor"
                text-anchor="middle" font-weight="700">10</text>
        </svg>
      </button>
      <button id="play" disabled>▶</button>
      <button class="skip" id="fwd" disabled title="Forward 10 seconds" aria-label="Forward 10 seconds">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          <text x="12" y="15.5" font-size="8.5" stroke="none" fill="currentColor"
                text-anchor="middle" font-weight="700">10</text>
        </svg>
      </button>
    </div>

    <div class="card">
      <div class="row"><span class="name">Tempo</span><span class="val" id="tempoVal">×1.00</span></div>
      <input type="range" id="tempo" min="0.5" max="2" step="0.01" value="1" />
      <div class="hint">Speed without changing pitch</div>
      <div class="row"><span class="name">Pitch</span><span class="val" id="pitchVal">+0 st</span></div>
      <input type="range" id="pitch" min="-12" max="12" step="1" value="0" />
      <div class="hint">Pitch without changing speed</div>
      <button class="reset" id="reset">Reset effects</button>
    </div>

    <div class="sources">
      <button class="primary" id="pick">📂 Import audio file</button>
      <div class="two">
        <button id="demo">▶ Demo track</button>
        <button id="url">🔗 Load from URL</button>
      </div>
      <button id="apple">🎵 Apple Music</button>
    </div>
    <input type="file" id="file" accept="audio/*" hidden />
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
